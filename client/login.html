<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login - Sistema de Máquinas</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      height: 100%; margin: 0; padding: 0;
      font-family: 'Inter', Arial, Helvetica, sans-serif;
      background: #f5f7fa;
      display: flex; align-items: center; justify-content: center;
    }

    .login-wrapper {
      width: 100%; max-width: 640px; padding: 32px;
    }

    .login-card {
      background: #fff; border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 48px 40px 40px;
      border: 1px solid #f0f0f0;
    }

    .login-logo {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 32px;
    }
    .login-logo img {
      height: 24px; max-width: 100px; width: auto; margin-bottom: 16px;
    }
    .login-logo h1 {
      font-size: 1.25rem; font-weight: 700; color: #1e293b;
      margin: 0; text-align: center;
    }
    .login-logo p {
      margin: 6px 0 0; font-size: 0.85rem; color: #64748b;
    }

    .form-group {
      display: flex; flex-direction: column; gap: 5px; margin-bottom: 18px;
    }
    .form-group label {
      font-size: 0.75rem; font-weight: 600; color: #475569;
      text-transform: uppercase; letter-spacing: 0.04em;
      display: flex; align-items: center; gap: 6px;
    }
    .form-group label svg { width: 14px; height: 14px; color: #188331; flex-shrink: 0; }
    .form-group input {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid #e2e8f0; border-radius: 10px;
      font-size: 0.9rem; font-family: inherit; color: #1e293b;
      background: #f8fafc; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .form-group input:focus {
      border-color: #188331;
      box-shadow: 0 0 0 3px rgba(24,131,49,0.12);
      background: #fff;
    }

    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 12px; border: none; border-radius: 10px;
      font-size: 0.9rem; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all 0.2s;
    }
    .btn svg { width: 18px; height: 18px; }
    .btn-primary { background: #188331; color: #fff; }
    .btn-primary:hover { background: #146a28; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(24,131,49,0.25); }
    .btn:active { transform: scale(0.97); }

    .error-msg {
      font-size: 0.8rem; color: #dc2626; font-weight: 500;
      display: none; align-items: center; gap: 6px;
      margin-bottom: 16px; padding: 10px 12px;
      background: #fef2f2; border-radius: 8px;
      border: 1px solid #fecaca;
    }
    .error-msg.show { display: flex; }
    .error-msg svg { width: 16px; height: 16px; flex-shrink: 0; }

    .register-link {
      text-align: center; margin-top: 20px; font-size: 0.82rem; color: #64748b;
    }
    .register-link a {
      color: #188331; text-decoration: none; font-weight: 600;
    }
    .register-link a:hover { text-decoration: underline; }

    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      align-items: center; justify-content: center; z-index: 1000;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: #fff; border-radius: 20px; padding: 32px; width: 100%; max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15); position: relative;
    }
    .modal-box h2 { font-size: 1.1rem; margin: 0 0 4px; color: #1e293b; }
    .modal-box p.modal-sub { font-size: 0.82rem; color: #64748b; margin: 0 0 20px; }
    .modal-box .btn-close {
      position: absolute; top: 16px; right: 16px; background: none; border: none;
      cursor: pointer; color: #94a3b8; padding: 4px;
    }
    .modal-box .btn-close:hover { color: #475569; }
    .modal-box .form-group { margin-bottom: 14px; }
    .modal-box .btn { width: 100%; }
  </style>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">
        <img src="logo_secretaria_gecotec.png" alt="Logotipo" onerror="this.style.display='none'" />
        <h1>Sistema de Máquinas</h1>
        <p>Faça login para continuar</p>
      </div>

      <div class="error-msg" id="loginError"><i data-lucide="alert-circle"></i> <span id="errorText">Usuário ou senha inválidos</span></div>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label><i data-lucide="user"></i> Usuário</label>
          <input id="username" type="text" placeholder="seu usuário" required autofocus autocomplete="username" />
        </div>
        <div class="form-group">
          <label><i data-lucide="lock"></i> Senha</label>
          <input id="password" type="password" placeholder="Sua senha" required autocomplete="current-password" />
        </div>
        <div style="text-align:right; margin-top:-12px; margin-bottom:16px;">
          <a href="#" style="font-size:0.8rem; color:#188331; text-decoration:none; font-weight:500;">Esqueci minha senha</a>
        </div>
        <button type="submit" class="btn btn-primary"><i data-lucide="log-in"></i> Entrar</button>
      </form>


    </div>
  </div>

  <div class="modal-overlay" id="resetModal">
    <div class="modal-box">
      <button class="btn-close" id="closeModal"><i data-lucide="x"></i></button>
      <h2>Redefinir Senha</h2>
      <p class="modal-sub">Digite seu login e a nova senha.</p>
      <form id="resetForm" autocomplete="off">
        <div class="form-group">
          <label><i data-lucide="user"></i> Login</label>
          <input id="resetLogin" type="text" placeholder="seu login" required autocomplete="off" />
        </div>
        <div class="form-group">
          <label><i data-lucide="lock"></i> Nova senha</label>
          <input id="resetPassword" type="password" placeholder="nova senha" required autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label><i data-lucide="lock"></i> Confirmar nova senha</label>
          <input id="resetPasswordConfirm" type="password" placeholder="confirme a nova senha" required autocomplete="new-password" />
        </div>
        <button type="submit" class="btn btn-primary"><i data-lucide="save"></i> Alterar senha</button>
      </form>
      <div id="resetMsg" style="margin-top:12px; font-size:0.82rem; text-align:center;"></div>
    </div>
  </div>

  <script src="utils.js"></script>
  <script>
    const form = document.getElementById('loginForm')
    const errorEl = document.getElementById('loginError')
    const errorText = document.getElementById('errorText')
    const submitBtn = form.querySelector('button[type="submit"]')

    function showError(msg) {
      errorText.textContent = msg
      errorEl.classList.add('show')
    }

    function initialsFrom(nome) {
      if (!nome) return 'U'
      return nome.trim().split(/\s+/).map(w => w[0]).slice(0, 2).join('').toUpperCase()
    }

    form.addEventListener('submit', async e => {
      e.preventDefault()
      errorEl.classList.remove('show')

      const username = document.getElementById('username').value.trim()
      const password = document.getElementById('password').value

      if (!username || !password) { showError('Preencha todos os campos'); return }

      submitBtn.disabled = true
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        })

        if (!res.ok) {
          const data = await res.json().catch(() => ({}))
          showError(data.error || 'Usuário ou senha inválidos')
          return
        }

        const { token, user } = await res.json()
        // Sessão no padrão do auth-kit: { token, ...user } em sessionStorage.
        sessionStorage.setItem('auth_user', JSON.stringify({ token, ...user }))
        localStorage.setItem('user_initials', initialsFrom(user.nome))
        window.location.href = 'index.html'
      } catch (err) {
        showError('Não foi possível conectar ao servidor')
      } finally {
        submitBtn.disabled = false
      }
    })

    if (typeof lucide !== 'undefined') lucide.createIcons()

    const modal = document.getElementById('resetModal')
    const closeModal = document.getElementById('closeModal')
    const esqueci = document.querySelector('a[href="#"]')
    const resetForm = document.getElementById('resetForm')
    const resetMsg = document.getElementById('resetMsg')

    esqueci.addEventListener('click', e => {
      e.preventDefault()
      resetMsg.textContent = ''
      resetForm.reset()
      modal.classList.add('show')
    })

    closeModal.addEventListener('click', () => modal.classList.remove('show'))
    modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('show') })

    resetForm.addEventListener('submit', async e => {
      e.preventDefault()
      const pass = document.getElementById('resetPassword').value
      const confirm = document.getElementById('resetPasswordConfirm').value
      if (pass !== confirm) {
        resetMsg.textContent = 'As senhas não conferem'
        resetMsg.style.color = '#dc2626'
        return
      }
      resetMsg.textContent = 'Aguarde...'
      resetMsg.style.color = '#64748b'
      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            login: document.getElementById('resetLogin').value.trim(),
            newPassword: pass,
          }),
        })
        const data = await res.json()
        if (res.ok) {
          resetMsg.textContent = 'Senha alterada com sucesso!'
          resetMsg.style.color = '#188331'
          resetForm.reset()
        } else {
          resetMsg.textContent = data.error || 'Falha ao redefinir senha'
          resetMsg.style.color = '#dc2626'
        }
      } catch (err) {
        resetMsg.textContent = 'Erro de conexão com o servidor'
        resetMsg.style.color = '#dc2626'
      }
    })
  </script>
</body>
</html>
