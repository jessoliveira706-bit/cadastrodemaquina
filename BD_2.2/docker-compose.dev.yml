# Override de desenvolvimento.
# Uso: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Diferenças em relação ao modo padrão (produção):
#  - NODE_ENV=development (habilita o bypass via DEV_TOKEN fora de produção)
#  - roda `tsx watch` (hot reload ao salvar arquivos)
#  - monta ./server/src e tsconfig.json do host -> mudanças refletem na hora
services:
  api:
    environment:
      NODE_ENV: development
    command: ["npm", "run", "dev"]
    volumes:
      # node_modules fica na imagem; só o código-fonte vem do host.
      - ./server/src:/app/src
      - ./server/tsconfig.json:/app/tsconfig.json:ro
