<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Unidades - Seleção</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;max-width:760px;margin:24px auto;padding:0 16px;color:#222}
    header{display:flex;align-items:center;gap:12px}
    a.back{color:#0366d6;text-decoration:none}
    h1{font-size:20px;margin-bottom:8px}
    label{display:block;font-size:13px;margin-bottom:6px}
    select{width:100%;padding:8px;border:1px solid #ccc;border-radius:4px}
    .controls{display:flex;gap:8px;align-items:center;margin-top:12px}
    button{padding:8px 12px;border:none;background:#0366d6;color:#fff;border-radius:4px;cursor:pointer}
    button.secondary{background:#6c757d}
  </style>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="utils.js"></script>
</head>
<body>
  <a href="index.html" id="logo-link"><img id="site-logo" src="logo_secretaria_gecotec.png" alt="Logotipo"></a>
  <button id="btnSair" class="btn-sair" title="Sair"><i data-lucide="log-out"></i></button>
  <div class="sidebar">
    <div class="user-avatar" id="userAvatar">U</div>
    <nav>
      <ul>
        <li><a href="index.html"><i data-lucide="home"></i> Início</a></li>
        <li><a href="fila.html"><i data-lucide="clipboard-list"></i> Fila</a></li>
        <li><a href="machines.html"><i data-lucide="monitor"></i> Máquinas</a></li>
        <li><a href="unidades-list.html"><i data-lucide="building"></i> Unidades</a></li>
        <li><a href="departments-list.html"><i data-lucide="folder"></i> Departamentos</a></li>
        <li><a href="usuarios-list.html"><i data-lucide="users"></i> Usuários</a></li>
        </ul>
    </nav>
  </div>
  <header>
    <a class="back" href="index.html">← Voltar</a>
    <h1>Selecione uma Unidade</h1>
  </header>


  <p class="muted">Escolha uma das unidades abaixo.</p>


  <div>
    <label for="unitSelect">Unidade</label>
    <select id="unitSelect">
      <option value="">-- selecione --</option>
    </select>
    <div style="margin-top:8px;display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <input id="newUnit" placeholder="Nome da unidade" style="padding:8px;border:1px solid #ccc;border-radius:4px" />
      <input id="unitCep" placeholder="CEP" style="padding:8px;border:1px solid #ccc;border-radius:4px" />
      <input id="unitAddress" placeholder="Endereço" style="grid-column:1/3;padding:8px;border:1px solid #ccc;border-radius:4px" />
      <input id="unitPhone" placeholder="Telefone" style="padding:8px;border:1px solid #ccc;border-radius:4px" />
      <div style="display:flex;gap:8px">
        <button type="button" id="addUnitBtn">Adicionar</button>
        <button type="button" id="deleteUnitBtn" style="background:#d9534f">Excluir</button>
      </div>
    </div>
  </div>


  <div class="controls">
    <button id="saveBtn">Salvar unidade</button>
    <button type="button" class="secondary" id="clearBtn">Limpar</button>
  </div>


  <script>
    const sel = document.getElementById('unitSelect')
    const saveBtn = document.getElementById('saveBtn')
    const clearBtn = document.getElementById('clearBtn')
    const newUnitInput = document.getElementById('newUnit')
    const addUnitBtn = document.getElementById('addUnitBtn')
    const deleteUnitBtn = document.getElementById('deleteUnitBtn')


    const UNITS_KEY = 'units_list_v1'
    const SELECTED_KEY = 'selected_unit'


    const DEFAULT_UNITS = [
      "ARQUIVO MUNICIPAL","BOM PRATO","CARTÓRIO ELEITORAL","CASA AFRO","CRAS BELÉM ESTAÇÃO","CRAS VASSOURAS","CRAS SANTO ANTÔNIO","CIC","Conselho tutelar I","Conselho tutelar II","CULTURA","DELEGACIA DA MULHER","EM ALAIN DOS SANTOS GOMES","EM ALFREDO VOLPI","EM ALMEIDA JUNIOR","EM AMADO PINTO DE SANTANA","EM ANISIO SPINDOLA","EM ANITA MALFATI","EM ANTONIO FEDERZONI","EM ANTONIO MUNIZ","EM ANTONIO PACHECO DO NASCIMENTO","EM BRIGADEIRO ROBERTO BRANDINI","EM CANDIDO PORTINARI","EM CARLOS DRUMOND DE ANDRADE","EM CASTRO ALVES","EM CLARICE LINSPECTOR","EM CORA CORALINA","EM DR FRANCISCO MORATO","EM EDITE PEREIRA DE ARRUDA","EM EGON SCHADEN","EM ELBA NOBREGA SOBRAL","EM ERICO VERISSIMO","EM FANNY GOLDBERG","EM FERNANDO PESSOA","EM GRACILIANO RAMOS","EM HEITOR HARTMANN","EM HOSUE MORITA AOKI","EM ISABEL LUPIANHES ROMERA RYAN","EM JORGE TERTULIANO RIZZI","EM JOSE BEZERRA SANCHES","EM LAIRCE LUPIANHES","EM LEONARDO DA VINCI","EM LIMA BARRETO","EM MACHADO DE ASSIS","EM MARCO AURELIO MAGOGA","EM MONTEIRO LOBATO","EM OLAVO BILAC","EM ORDÁRIO DE SOUZA MARTINS","EM PADRE LUIS SERGIO PACHECO DO NASCIMENTO","EM PAULO FREIRE","EM RADIALISTA JAIME GONCALVES","EM RUTH ROCHA","EM SONIA REGINA FRANCISCO DE OLIVEIRA","EM TANIA FERNANDES","EM TARSILA DO AMARAL","EM ULISSES SILVEIRA GUIMARAES","EM VANDA TEREZINHA NALIN","EM VEREADOR PASTOR JORGE GABRIEL RODRIGUES","EM VINICIUS DE MORAES","EM ZELIA GATAI","ESPORTES","FUNDO SOCIAL DE SOLIDARIEDADE","FUSBEMO","GUARDA CIVIL MUNICIPAL","MERENDA ESCOLAR","PAÇO MUNICIPAL","QUADRA DE ESPORTES","SEGURANÇA CIDADÃ"
    ]
    // converter para objetos com campos extras
    const DEFAULT_UNITS_OBJ = DEFAULT_UNITS.map(n=>({ name: n, address: '', cep: '', phone: '' }))


    function loadUnits(){
      try{
        const v = JSON.parse(localStorage.getItem(UNITS_KEY))
        if(!Array.isArray(v) || v.length===0) return DEFAULT_UNITS_OBJ.slice()
        // compat: array of strings -> convert to objects
        if(typeof v[0] === 'string') return v.map(n=>({ name: n, address: '', cep: '', phone: '' }))
        // if already objects, ensure fields exist
        return v.map(u=>({ name: u.name||'', address: u.address||'', cep: u.cep||'', phone: u.phone||'' }))
      }catch(e){ return DEFAULT_UNITS_OBJ.slice() }
    }
    function saveUnits(list){ localStorage.setItem(UNITS_KEY, JSON.stringify(list)) }


    function populate(){
      const list = loadUnits()
      sel.innerHTML = ''
      const ph = document.createElement('option'); ph.value = ''; ph.textContent = '-- selecione --'; sel.appendChild(ph)
      list.forEach(u=>{
        const o = document.createElement('option'); o.value = u.name; o.textContent = u.name; sel.appendChild(o)
      })
      try{ const s = localStorage.getItem(SELECTED_KEY); if(s) sel.value = s }catch(e){}
    }


    addUnitBtn.addEventListener('click', ()=>{
      const name = newUnitInput.value.trim()
      const cep = document.getElementById('unitCep').value.trim()
      const address = document.getElementById('unitAddress').value.trim()
      const phone = document.getElementById('unitPhone').value.trim()
      if(!name){ alert('Digite o nome da unidade'); return }
      const list = loadUnits()
      // Se o botão estiver em modo 'Atualizar', altera o item selecionado
      if(addUnitBtn.dataset.mode === 'update'){
        const old = sel.dataset.orig || sel.value
        if(!old){ alert('Selecione a unidade correta'); return }
        // evita duplicata ao renomear
        if(list.find(u=>u.name.toLowerCase()===name.toLowerCase() && u.name!==old)){ alert('Já existe uma unidade com esse nome'); return }
        const idx = list.findIndex(x=>x.name===old)
        if(idx===-1){ alert('Unidade original não encontrada'); return }
        list[idx] = { name, address, cep, phone }
        saveUnits(list)
        populate()
        sel.value = name
        resetAddMode()
        return
      }


      if(list.find(u=>u.name.toLowerCase()===name.toLowerCase())){ alert('Unidade já existe'); return }
      list.push({ name, address, cep, phone })
      saveUnits(list)
      populate()
      sel.value = name
      newUnitInput.value = ''
      document.getElementById('unitCep').value = ''
      document.getElementById('unitAddress').value = ''
      document.getElementById('unitPhone').value = ''
      newUnitInput.focus()
    })


    deleteUnitBtn.addEventListener('click', ()=>{
      const v = sel.value
      if(!v){ alert('Selecione uma unidade para excluir'); return }
      if(!confirm('Excluir unidade: ' + v + '?')) return
      let list = loadUnits()
      list = list.filter(u=>u.name!==v)
      saveUnits(list)
      localStorage.removeItem(SELECTED_KEY)
      populate()
    })


    // Ao selecionar, habilita edição: preenche input e alterna botão para Atualizar
    sel.addEventListener('change', ()=>{
      const v = sel.value
      if(v){
        const list = loadUnits()
        const obj = list.find(u=>u.name===v) || { name: v, address: '', cep: '', phone: '' }
        newUnitInput.value = obj.name
        document.getElementById('unitCep').value = obj.cep
        document.getElementById('unitAddress').value = obj.address
        document.getElementById('unitPhone').value = obj.phone
        addUnitBtn.textContent = 'Atualizar'
        addUnitBtn.dataset.mode = 'update'
        sel.dataset.orig = v
        deleteUnitBtn.style.display = 'inline-block'
      }else{
        resetAddMode()
      }
    })


    function resetAddMode(){
      newUnitInput.value = ''
      document.getElementById('unitCep').value = ''
      document.getElementById('unitAddress').value = ''
      document.getElementById('unitPhone').value = ''
      addUnitBtn.textContent = 'Adicionar'
      addUnitBtn.dataset.mode = 'add'
      deleteUnitBtn.style.display = 'none'
      delete sel.dataset.orig
    }


    saveBtn.addEventListener('click', ()=>{
      const v = sel.value
      if(!v){ alert('Selecione uma unidade'); return }
      localStorage.setItem(SELECTED_KEY, v)
      alert('Unidade salva: ' + v)
    })


    clearBtn.addEventListener('click', ()=>{ sel.value = ''; localStorage.removeItem(SELECTED_KEY) })


    populate()
    // iniciar estado do botão de excluir oculto quando sem seleção
    deleteUnitBtn.style.display = 'none'

    // carregar edição vindo da lista
    const editIdx = sessionStorage.getItem('editUnitIdx')
    if(editIdx !== null){
      sessionStorage.removeItem('editUnitIdx')
      const list = loadUnits()
      const u = list[Number(editIdx)]
      if(u){
        // preenche o select e dispara change para editar
        sel.value = u.name
        sel.dispatchEvent(new Event('change'))
        window.scrollTo({top:0,behavior:'smooth'})
      }
    }

    if (typeof lucide !== 'undefined') lucide.createIcons()
  </script>
</body>
</html>
