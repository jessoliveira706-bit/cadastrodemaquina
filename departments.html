  <script>
    const STORAGE_KEY = 'departments_v1'
    const form = document.getElementById('deptForm')


    function load(){
      try{ return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]') }catch(e){return[]}
    }
    function save(list){ localStorage.setItem(STORAGE_KEY, JSON.stringify(list)) }


    form.addEventListener('submit', e=>{
      e.preventDefault()
      const idx = document.getElementById('idx').value
      const street = document.getElementById('location_street').value.trim()
      const number = document.getElementById('location_number').value.trim()
      const neighborhood = document.getElementById('location_neighborhood').value.trim()
      const composedLocation = [street ? street : null, number ? number : null].filter(Boolean).join(', ') + (neighborhood ? ' - ' + neighborhood : '')
      const item = {
        code: document.getElementById('code').value.trim(),
        name: document.getElementById('name').value.trim(),
        manager: document.getElementById('manager').value.trim(),
        matricula: document.getElementById('matricula').value.trim(),
        location: composedLocation,
        desc: document.getElementById('desc').value.trim()
      }
      if(!item.code){ alert('Informe o Código do departamento'); return }
      const list = load()
      if(idx==='') list.push(item); else list[Number(idx)] = item
      save(list)
      form.reset(); document.getElementById('idx').value = ''
    })


    document.getElementById('clearBtn').addEventListener('click', ()=>{ form.reset(); document.getElementById('idx').value = '' })


    document.getElementById('exportBtn').addEventListener('click', ()=>{
      const list = load(); if(list.length===0){ alert('Nenhum dado para exportar'); return }
      const header = ['code','name','manager','matricula','location','desc']
      const rows = [header.join(',')].concat(list.map(r=>header.map(k=>`"${String(r[k]||'').replace(/"/g,'""')}"`).join(',')))
      const csv = rows.join('\n')
      const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'})
      const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'departamentos.csv'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url)
    })


    document.getElementById('importFile').addEventListener('change', async e=>{
      const f = e.target.files[0]; if(!f) return
      const text = await f.text()
      try{
        const lines = text.split(/\r?\n/).filter(Boolean)
        const header = lines.shift().split(/,/) .map(h=>h.replace(/(^"|"$)/g,''))
        const list = lines.map(l=>{
          const cols = l.match(/(?:\"([^\"]*)\"|([^,]*))(?:,|$)/g).map(c=>c.replace(/(^,|,$)/g,''))
          const obj = {}
          header.forEach((h,idx)=>{ obj[h.trim()] = (cols[idx]||'').replace(/^"|"$/g,'') })
          return obj
        })
        const existing = load(); save(existing.concat(list)); e.target.value = ''
      }catch(err){ alert('Falha ao importar CSV: formato inválido') }
    })


    if (typeof lucide !== 'undefined') lucide.createIcons()

    // carregar edição vindo da lista
    const editIdx = sessionStorage.getItem('editDeptIdx')
    if(editIdx !== null){
      sessionStorage.removeItem('editDeptIdx')
      const list = load()
      const d = list[Number(editIdx)]
      if(d) window.edit(Number(editIdx))
    }
  </script>
